# HQNN Benchmark — Default Configuration
# Override any key via a custom YAML passed to --config

seed: 42
models_to_run: [shnn, parallel, tabnet, snn]

data:
  raw_path: data/raw/creditcard.csv
  target_column: Class
  drop_columns: [Time]
  test_size: 0.20
  random_state: 42

preprocessing:
  n_components: 8        # PCA components = qubit count
  robust_scale: true
  minmax_range: [0.0, 3.14159265]  # [0, π] for angle encoding

smote:
  enabled: true
  k_neighbors: 5
  random_state: 42

cv:
  n_folds: 5
  shuffle: true
  random_state: 42

noise:
  enabled: false
  backend: default.mixed
  depolarizing_p: 0.0

# ── Quantum hybrid models ────────────────────────────────────────────────────

shnn:
  pre_fc_dims: []        # No pre-quantum FC: input → VQC directly (Linear 8→8 + PiSigmoid only)
  post_fc_dims: []       # No post-quantum FC: VQC → output directly (Linear 1→1 + Sigmoid only)
  dropout: 0.1
  vqc:
    n_qubits: 8          # Exposé spec: 8 qubits
    n_layers: 2          # Exposé spec: 2 layers → 48 quantum params → total ~122 params
    backend: lightning.qubit
    diff_method: adjoint

parallel:
  mlp_dims: [16, 8]
  post_fc_dims: [8]
  dropout: 0.1
  vqc:
    n_qubits: 8
    n_layers: 2
    backend: lightning.qubit
    diff_method: adjoint

# ── Classical baselines ──────────────────────────────────────────────────────

snn:
  hidden_dims: [64, 32, 16]
  alpha_dropout: 0.05

ftt:
  d_token: 32
  n_blocks: 2
  n_heads: 4
  ffn_d_hidden_factor: 1.333
  attn_dropout: 0.0
  ffn_dropout: 0.0
  residual_dropout: 0.0

resnet:
  d: 32
  d_hidden: 64
  n_blocks: 2
  dropout: 0.0

saint:
  d_token: 32
  n_blocks: 2
  n_heads: 4
  ffn_d_hidden_factor: 1.333
  attn_dropout: 0.0

tabnet:
  n_d: 8
  n_a: 8
  n_steps: 3
  gamma: 1.3
  lambda_sparse: 0.001

# ── Training ─────────────────────────────────────────────────────────────────

training:
  epochs: 100
  batch_size: 256
  lr: 0.001
  weight_decay: 0.00001
  early_stopping_patience: 15
  optimizer: adam
  device: auto

training_quantum:
  epochs: 100
  batch_size: 256
  lr: 0.01
  weight_decay: 0.00001
  early_stopping_patience: 20
  optimizer: adam
  device: auto

training_tabnet:
  max_epochs: 100
  patience: 15
  batch_size: 256

# ── Evaluation ───────────────────────────────────────────────────────────────

evaluation:
  primary_metrics: [mcc, pr_auc]
  secondary_metrics: [f1_fraud, roc_auc]
  significance_test: wilcoxon
  effect_size: rank_biserial

paths:
  results_dir: results
  figures_dir: results/figures
  metrics_dir: results/metrics
  models_dir: results/models
  folds_dir: results/folds
